; M5Cardputer HP 12C-style RPN Financial Calculator

[platformio]
default_envs = cardputer

[env:cardputer]
platform = espressif32
; The Cardputer is built on the M5Stack StampS3 module; that's the board id.
board = m5stack-stamps3
framework = arduino
lib_deps =
    m5stack/M5Cardputer@^1.0.4
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
build_unflags = -std=gnu++11
extra_scripts = post:scripts/post_build_rename.py

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -DUNIT_TEST
    -Iinclude
    -Isrc
build_src_filter =
    +<rpn/>
    +<fin/>
    +<stats/>
    +<mem/registers.cpp>
    +<app/errors.cpp>
